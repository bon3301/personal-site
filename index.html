<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bon.me</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav>

        <a href="#projects" class="nav-link">projects</a>
        <a href="#blog" class="nav-link">blog</a>

        <div class="dropdown">
            <button class="dropdown-toggle" type="button" aria-expanded="false" aria-controls="more-menu">
                <span>more</span>
                <div class="dropdown-arrow"></div>
            </button>
            <div class="dropdown-menu" id="more-menu">
                <a href="#shows" class="dropdown-item">shows</a>
                <a href="#albums" class="dropdown-item">albums</a>
            </div>
        </div>
    </nav>
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">
        <i data-lucide="sun" class="sun-icon"></i>
        <i data-lucide="moon" class="moon-icon"></i>
    </button>
    <canvas id="canvas" aria-hidden="true"> </canvas>

    <div class="container">
        <div class="content-wrapper">
            <h1 class="title">bon3301</h1>
            <p class="caption">a 17 year old full stack developer in the works</p>
            <div class="social-links" role="navigation" aria-label="Social media links">
                <a href="https://discord.com/users/" target="_blank" rel="noopener noreferrer" class="social-link"
                    aria-label="Discord profile">
                    <span class="brand-icon" data-brand="discord"></span>
                </a>

                <a href="https://github.com/bon3301" target="_blank" rel="noopener noreferrer" class="social-link"
                    aria-label="GitHub profile">
                    <span class="brand-icon" data-brand="github"></span>
                </a>

                <a href="https://open.spotify.com/user/" target="_blank" rel="noopener noreferrer" class="social-link"
                    aria-label="Spotify profile">
                    <span class="brand-icon" data-brand="spotify"></span>
                </a>

                <a href="mailto:" class="social-link" aria-label="Email contact">
                    <i data-lucide="mail" class="mail-icon"></i>
                </a>
            </div>
            <div class="info-section">
                <div class="clock-container">
                    <i data-lucide="clock" class="clock-icon"></i>
                    <div class="clock" id="clock" aria-live="polite"></div>
                </div>
                <div class="weather-container" id="weather-widget">
                    <i data-lucide="cloud-sun" class="weather-icon"></i>
                    <span class="weather-text" id="weather-text">Loading weather...</span>
                </div>
            </div>
            <a id="spotify-widget" href="#" target="_blank" rel="noopener noreferrer" class="spotify-now-playing">

                <div class="spotify-album-art loading">
                    <span class="brand-icon spotify-logo" data-brand="spotify"></span>
                </div>

                <div class="spotify-info">
                    <div class="spotify-status">
                        <div class="spotify-status-dot"></div>
                        <span class="brand-icon spotify-logo" data-brand="spotify"></span>
                        <span id="spotify-status-text">Loading...</span>
                    </div>

                    <div class="spotify-title" id="spotify-title">
                        Connecting to Spotify
                    </div>

                    <div class="spotify-artist" id="spotify-artist">
                        Please wait...
                    </div>
                </div>
            </a>
        </div>
    </div>

    <script type="module" src="./script.js"></script>
</body>

</html>
